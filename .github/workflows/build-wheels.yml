name: Build Z3 ARM64 wheel

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/output \
            python:3.13-slim bash -c "
              apt-get update && apt-get install -y build-essential cmake git
              pip install wheel setuptools
              MAKEFLAGS='-j4' pip wheel z3-solver --no-deps -w /output/
            "

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.whl"
          tag_name: z3-aarch64-v1
